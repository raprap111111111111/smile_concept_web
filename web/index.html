<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="smile_concept_web">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>smile_concept_web</title>
  <link rel="manifest" href="manifest.json">
</head>

<body>
  <style>
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #0F172A 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }

    .loader-container {
      text-align: center;
    }

    .loader-logo {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(234, 179, 8, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 0 40px rgba(234, 179, 8, 0.3);
      animation: pulse 2s infinite;
    }

    .loader-logo svg {
      width: 40px;
      height: 40px;
    }

    .loader-text {
      color: #EAB308;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .loader-subtext {
      color: rgba(255, 255, 255, 0.4);
      font-family: -apple-system, sans-serif;
      font-size: 12px;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid rgba(234, 179, 8, 0.2);
      border-top-color: #EAB308;
      border-radius: 50%;
      margin: 20px auto 0;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.05);
      }
    }
  </style>

  <div id="loading">
    <div class="loader-container">
      <div class="loader-logo">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="#EAB308" opacity="0.2" />
          <path d="M8 10c0-1.5 1-3 4-3s4 1.5 4 3v4c0 1.5-1 3-4 3s-4-1.5-4-3v-4z" stroke="#EAB308" stroke-width="2"
            fill="none" />
        </svg>
      </div>
      <div class="loader-text">SmileConcept</div>
      <div class="loader-subtext">Loading...</div>
      <div class="spinner"></div>
    </div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loading = document.querySelector('#loading');
      if (loading) {
        loading.style.opacity = '0';
        setTimeout(function () { loading.remove(); }, 500);
      }
    });
  </script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
